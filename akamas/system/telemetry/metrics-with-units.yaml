# Metrics extracted from the Grafana dashboard:
#   "vLLM Performance Triage (5-step workflow)" (uid: vllm-triage-5step)
# Source: k8s/monitoring/vllm-performance-dashboard.json
#
# Each entry maps a logical metric name to the Prometheus query (datasourceMetric)
# used by the dashboard panel, plus the unit of measure (Grafana unit code taken
# from the panel fieldConfig). Template variables ($model, $pod, $gpu, $percentile)
# are preserved as-is from the dashboard definition.
#
# Unit codes: s=seconds, reqps=requests/sec, short=dimensionless count/rate,
# percentunit=0..1 ratio, percent=0..100, decmbytes=MB, watt=watts,
# celsius=°C, ns=nanoseconds.
metrics:

  # --- Step 1 — Isolate the symptom: TTFT vs. ITL ---
  - metric: e2e_request_latency_p95
    datasourceMetric: 'histogram_quantile(0.95, sum by(le)(rate(vllm:e2e_request_latency_seconds_bucket{model_name=~"$model", pod=~"$pod"}[1m])))'
    unit: s
  - metric: e2e_request_latency_avg
    datasourceMetric: 'sum(rate(vllm:e2e_request_latency_seconds_sum{model_name=~"$model", pod=~"$pod"}[1m])) / clamp_min(sum(rate(vllm:e2e_request_latency_seconds_count{model_name=~"$model", pod=~"$pod"}[1m])), 1e-9)'
    unit: s
  - metric: request_success_rate
    datasourceMetric: 'sum(rate(vllm:request_success_total{model_name=~"$model", pod=~"$pod"}[1m]))'
    unit: reqps
  - metric: time_to_first_token_p95
    datasourceMetric: 'histogram_quantile(0.95, sum by(le)(rate(vllm:time_to_first_token_seconds_bucket{model_name=~"$model", pod=~"$pod"}[1m])))'
    unit: s
  - metric: time_to_first_token_avg
    datasourceMetric: 'sum(rate(vllm:time_to_first_token_seconds_sum{model_name=~"$model", pod=~"$pod"}[1m])) / clamp_min(sum(rate(vllm:time_to_first_token_seconds_count{model_name=~"$model", pod=~"$pod"}[1m])), 1e-9)'
    unit: s
  - metric: prefill_token_throughput
    datasourceMetric: 'sum(rate(vllm:prompt_tokens_total{model_name=~"$model", pod=~"$pod"}[1m]))'
    unit: short
  - metric: inter_token_latency_p95
    datasourceMetric: 'histogram_quantile(0.95, sum by(le)(rate(vllm:inter_token_latency_seconds_bucket{model_name=~"$model", pod=~"$pod"}[1m])))'
    unit: s
  - metric: inter_token_latency_avg
    datasourceMetric: 'sum(rate(vllm:inter_token_latency_seconds_sum{model_name=~"$model", pod=~"$pod"}[1m])) / clamp_min(sum(rate(vllm:inter_token_latency_seconds_count{model_name=~"$model", pod=~"$pod"}[1m])), 1e-9)'
    unit: s
  - metric: decode_token_throughput
    datasourceMetric: 'sum(rate(vllm:generation_tokens_total{model_name=~"$model", pod=~"$pod"}[1m]))'
    unit: short

  # --- Step 2 — Detect server saturation ---
  - metric: num_requests_running
    datasourceMetric: 'sum(vllm:num_requests_running{model_name=~"$model", pod=~"$pod"})'
    unit: short
  - metric: num_requests_waiting
    datasourceMetric: 'sum(vllm:num_requests_waiting{model_name=~"$model", pod=~"$pod"})'
    unit: short

  # --- Step 3 — Evaluate VRAM and KV cache health ---
  - metric: kv_cache_usage_avg
    datasourceMetric: 'avg(vllm:kv_cache_usage_perc{model_name=~"$model", pod=~"$pod"})'
    unit: percentunit
  - metric: kv_cache_usage_max
    datasourceMetric: 'max(vllm:kv_cache_usage_perc{model_name=~"$model", pod=~"$pod"})'
    unit: percentunit
  - metric: preemption_rate
    datasourceMetric: 'sum(rate(vllm:num_preemptions_total{model_name=~"$model", pod=~"$pod"}[1m]))'
    unit: short
  - metric: prefix_cache_hit_rate
    datasourceMetric: 'sum(rate(vllm:prefix_cache_hits_total{model_name=~"$model", pod=~"$pod"}[1m])) / clamp_min(sum(rate(vllm:prefix_cache_queries_total{model_name=~"$model", pod=~"$pod"}[1m])), 1)'
    unit: percentunit

  # --- Step 4 — Analyze request sequence lengths ---
  - metric: input_sequence_length_p95
    datasourceMetric: 'histogram_quantile(0.95, sum by(le)(rate(vllm:request_prompt_tokens_bucket{model_name=~"$model", pod=~"$pod"}[5m])))'
    unit: short
  - metric: input_sequence_length_avg
    datasourceMetric: 'sum(rate(vllm:request_prompt_tokens_sum{model_name=~"$model", pod=~"$pod"}[5m])) / clamp_min(sum(rate(vllm:request_prompt_tokens_count{model_name=~"$model", pod=~"$pod"}[5m])), 1e-9)'
    unit: short
  - metric: output_sequence_length_p95
    datasourceMetric: 'histogram_quantile(0.95, sum by(le)(rate(vllm:request_generation_tokens_bucket{model_name=~"$model", pod=~"$pod"}[5m])))'
    unit: short
  - metric: output_sequence_length_avg
    datasourceMetric: 'sum(rate(vllm:request_generation_tokens_sum{model_name=~"$model", pod=~"$pod"}[5m])) / clamp_min(sum(rate(vllm:request_generation_tokens_count{model_name=~"$model", pod=~"$pod"}[5m])), 1e-9)'
    unit: short

  # --- Step 5 — Review distributed inference strategy ---
  - metric: fleet_e2e_latency_percentile
    datasourceMetric: 'histogram_quantile(${percentile}, sum by(le)(rate(vllm:e2e_request_latency_seconds_bucket{model_name=~"$model", pod=~"$pod"}[5m])))'
    unit: s
  - metric: fleet_inter_token_latency_percentile
    datasourceMetric: 'histogram_quantile(${percentile}, sum by(le)(rate(vllm:inter_token_latency_seconds_bucket{model_name=~"$model", pod=~"$pod"}[5m])))'
    unit: s
  - metric: fleet_request_success_rate
    datasourceMetric: 'sum(rate(vllm:request_success_total{model_name=~"$model", pod=~"$pod"}[5m]))'
    unit: reqps
  - metric: fleet_kv_cache_usage_avg
    datasourceMetric: 'avg(vllm:kv_cache_usage_perc{model_name=~"$model", pod=~"$pod"})'
    unit: percentunit
  - metric: inter_token_latency_p95_5m
    datasourceMetric: 'histogram_quantile(0.95, sum by(le)(rate(vllm:inter_token_latency_seconds_bucket{model_name=~"$model", pod=~"$pod"}[5m])))'
    unit: s
  - metric: inter_token_latency_p95_max_per_pod
    datasourceMetric: 'max(histogram_quantile(0.95, sum by(pod, le)(rate(vllm:inter_token_latency_seconds_bucket{model_name=~"$model", pod=~"$pod"}[5m]))))'
    unit: s
  - metric: inter_token_latency_p95_min_per_pod
    datasourceMetric: 'min(histogram_quantile(0.95, sum by(pod, le)(rate(vllm:inter_token_latency_seconds_bucket{model_name=~"$model", pod=~"$pod"}[5m]))))'
    unit: s

  # --- GPU utilization (DCGM-exporter) ---
  - metric: gpu_util
    datasourceMetric: 'avg by(gpu)(DCGM_FI_DEV_GPU_UTIL{pod=~"$pod", gpu=~"$gpu"})'
    unit: percent
  - metric: gpu_sm_active
    datasourceMetric: 'avg by(gpu)(DCGM_FI_PROF_SM_ACTIVE{pod=~"$pod", gpu=~"$gpu"})'
    unit: percentunit
  - metric: gpu_sm_occupancy
    datasourceMetric: 'avg by(gpu)(DCGM_FI_PROF_SM_OCCUPANCY{pod=~"$pod", gpu=~"$gpu"})'
    unit: percentunit
  - metric: gpu_tensor_core_active
    datasourceMetric: 'avg by(gpu)(DCGM_FI_PROF_PIPE_TENSOR_ACTIVE{pod=~"$pod", gpu=~"$gpu"})'
    unit: percentunit
  - metric: gpu_dram_active
    datasourceMetric: 'avg by(gpu)(DCGM_FI_PROF_DRAM_ACTIVE{pod=~"$pod", gpu=~"$gpu"})'
    unit: percentunit
  - metric: gpu_fb_used
    datasourceMetric: 'sum by(gpu)(DCGM_FI_DEV_FB_USED{pod=~"$pod", gpu=~"$gpu"})'
    unit: decmbytes
  - metric: gpu_fb_total
    datasourceMetric: 'sum by(gpu)(DCGM_FI_DEV_FB_USED{pod=~"$pod", gpu=~"$gpu"} + DCGM_FI_DEV_FB_FREE{pod=~"$pod", gpu=~"$gpu"})'
    unit: decmbytes
  - metric: gpu_power_usage
    datasourceMetric: 'max by(gpu)(DCGM_FI_DEV_POWER_USAGE{pod=~"$pod", gpu=~"$gpu"})'
    unit: watt
  - metric: gpu_power_limit
    datasourceMetric: 'max by(gpu)(DCGM_FI_DEV_POWER_MGMT_LIMIT{pod=~"$pod", gpu=~"$gpu"})'
    unit: watt
  - metric: gpu_temp
    datasourceMetric: 'max by(gpu)(DCGM_FI_DEV_GPU_TEMP{pod=~"$pod", gpu=~"$gpu"})'
    unit: celsius
  - metric: gpu_memory_temp
    datasourceMetric: 'max by(gpu)(DCGM_FI_DEV_MEMORY_TEMP{pod=~"$pod", gpu=~"$gpu"})'
    unit: celsius
  - metric: gpu_power_violation_rate
    datasourceMetric: 'sum by(gpu)(rate(DCGM_FI_DEV_POWER_VIOLATION{pod=~"$pod", gpu=~"$gpu"}[1m]))'
    unit: ns
  - metric: gpu_thermal_violation_rate
    datasourceMetric: 'sum by(gpu)(rate(DCGM_FI_DEV_THERMAL_VIOLATION{pod=~"$pod", gpu=~"$gpu"}[1m]))'
    unit: ns
  - metric: gpu_pcie_replay_rate
    datasourceMetric: 'sum by(gpu)(rate(DCGM_FI_DEV_PCIE_REPLAY_COUNTER{pod=~"$pod", gpu=~"$gpu"}[1m]))'
    unit: short

  # --- Advanced: non-tensor pipe activity (FP16 / FP32) ---
  - metric: gpu_fp16_pipe_active
    datasourceMetric: 'avg by(gpu)(DCGM_FI_PROF_PIPE_FP16_ACTIVE{pod=~"$pod", gpu=~"$gpu"})'
    unit: percentunit
  - metric: gpu_fp32_pipe_active
    datasourceMetric: 'avg by(gpu)(DCGM_FI_PROF_PIPE_FP32_ACTIVE{pod=~"$pod", gpu=~"$gpu"})'
    unit: percentunit
