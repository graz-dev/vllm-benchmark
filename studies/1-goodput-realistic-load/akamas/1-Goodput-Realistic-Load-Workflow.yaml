kind: workflow

# 2026-07-21: renamed with a -v2 suffix instead of reusing the old workflow's
# name — Akamas has no "update workflow"/"rename" CLI command at all (confirmed
# against live docs: only create/list/describe/delete exist for workflows), so
# a workflow change always means a new resource, not an in-place edit. This
# leaves the old "1-Goodput-Realistic-Load-Workflow" (referenced by the
# previously-renamed old study) untouched rather than deleting it.
#
# 2026-07-22: this -v2 workflow itself is deleted and recreated under the SAME
# name (not bumped to -v3) to remove the "Discover" task below — unlike the
# original workflow this replaced, -v2 never completed a full trial cycle
# worth preserving under its own name, so there's nothing to keep it separate
# from.
name: 1-Goodput-Realistic-Load-Workflow-v2
tasks:
  - name: Write config
    operator: FileConfigurator
    arguments:
      # ignoreUnsubstitutedTokens: true is REQUIRED for the baseline step's
      # doNotRenderParameters (see akamas/1-Goodput-Realistic-Load.yaml) to work at
      # all — confirmed 2026-07-15 against Akamas' own live docs
      # (docs.akamas.io/akamas-docs/reference/workflow-operators/fileconfigurator-operator.md):
      # a parameter excluded via doNotRenderParameters has no computed value, so its
      # ${vLLM.*} token is left unsubstituted in the rendered file. Without this flag,
      # FileConfigurator would FAIL on every baseline trial. apply_config.sh's Step 2
      # then strips those unsubstituted lines entirely before the file is applied.
      ignoreUnsubstitutedTokens: true
      source:
        hostname: toolbox
        username: akamas
        key: /work/vllm-benchmark/studies/1-goodput-realistic-load/akamas/id_rsa
        path: /work/vllm-benchmark/studies/1-goodput-realistic-load/k8s/01-deployment_template.yaml
      target:
        hostname: toolbox
        username: akamas
        key:  /work/vllm-benchmark/studies/1-goodput-realistic-load/akamas/id_rsa
        path: /work/vllm-benchmark/studies/1-goodput-realistic-load/k8s/01-deployment.yaml

  - name: Apply config
    operator: Executor
    arguments:
      retries: 0
      timeout: 60m
      host:
        hostname: toolbox
        username: akamas
        key:  /work/vllm-benchmark/studies/1-goodput-realistic-load/akamas/id_rsa
      command: bash /work/vllm-benchmark/studies/1-goodput-realistic-load/k8s/apply_config.sh

  - name: RunTest
    operator: Executor
    arguments:
      # 2026-07-22: the "Discover" task (per-trial saturation discovery, 2026-07-21)
      # was removed here — the two-task split didn't work out with Akamas' own
      # windowing model, see README's "Per-trial saturation discovery" section for
      # the full incident. RunTest is the only phase again: 12 x 300s = 60min.
      retries: 0
      timeout: 90m
      host:
        hostname: toolbox
        username: akamas
        key:  /work/vllm-benchmark/studies/1-goodput-realistic-load/akamas/id_rsa
      command: bash /work/vllm-benchmark/studies/1-goodput-realistic-load/k8s/run_test_goodput.sh
