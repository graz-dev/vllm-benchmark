apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: vllm-bench
  region: us-east-2
  version: "1.35"
  tags:
    Project: vllm-bench
    Provisioner: eksctl

iam:
  withOIDC: true

addons:
  - name: aws-ebs-csi-driver
    wellKnownPolicies:
      ebsCSIController: true

managedNodeGroups:

  - name: system
    instanceType: m6i.xlarge
    desiredCapacity: 1
    minSize: 1
    maxSize: 1
    volumeSize: 50
    labels:
      node-role: system

  - name: akamas
    instanceType: r6i.xlarge
    desiredCapacity: 1
    minSize: 1
    maxSize: 1
    volumeSize: 50
    labels:
      node-role: akamas

  - name: llm-serving
    instanceType: g5.2xlarge
    desiredCapacity: 1
    minSize: 0
    maxSize: 1
    volumeSize: 100
    amiFamily: AmazonLinux2023
    labels:
      node-role: llm-serving
    taints:
      - key: nvidia.com/gpu
        value: "present"
        effect: NoSchedule
