# Holds a local copy of the ShareGPT dataset, prepared once by
# 07-sharegpt-prep-job.yaml and reused read-only by every inference-perf trial
# (05-job.yaml) — avoids re-downloading the ~670MB source dataset on every single
# trial during the optimize step's hundreds of experiments.
#
# NOTE: the "cleaning" step in 07-sharegpt-prep-job.yaml does NOT fix the
# get_chat_data crash it was originally written for — that bug turned out to be
# in datasets.load_dataset() itself (re-serializes turns as JSON strings at load
# time, regardless of how the file on disk is written), not in the source data.
# The actual fix is 08-inference-perf-patch.yaml's monkey-patch. This PVC/prep-job
# pair is kept anyway purely for the re-download-avoidance benefit.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sharegpt-dataset
  namespace: llm-benchmark
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3-ephemeral
  resources:
    requests:
      storage: 5Gi
