# inference-perf config, mounted into the Job (05-job.yaml) via this ConfigMap.
# Verified directly against kubernetes-sigs/inference-perf's own official examples
# (examples/vllm/config.yml, examples/vllm/config-sweep.yml, 2026-07-15) — every field
# below is a real, confirmed key, not guessed.
apiVersion: v1
kind: ConfigMap
metadata:
  name: inference-perf-config
  namespace: llm-benchmark
data:
  config.yml: |
    # Real dataset (ShareGPT multi-turn conversations), not synthetic fixed
    # prompt/output token counts — this is the whole point of this study vs.
    # 0-explorative's GuideLLM "prompt_tokens=512,output_tokens=128" setup.
    #
    # `path` points at a CLEANED copy, not inference-perf's own auto-download
    # (which is what a bare `type: shareGPT` with no `path` does). Reason,
    # confirmed 2026-07-15 from a real job crash: some entries in the raw
    # dataset encode a conversation turn as a JSON string instead of a JSON
    # object (upstream issue kubernetes-sigs/inference-perf#429).
    # get_chat_data() (used for api.type: chat, our case) doesn't handle that
    # case and crashes with "string indices must be integers, not 'str'",
    # which aborts inference-perf's entire preprocessing stage — not a config
    # mistake on our side, a real gap in that code path (the sibling
    # get_completion_data() already works around it). 07-sharegpt-prep-job.yaml
    # downloads the dataset once and normalizes every turn into a real object,
    # mounted read-only here from the sharegpt-dataset PVC (see 05-job.yaml).
    data:
      type: shareGPT
      path: /data/sharegpt/ShareGPT_V3_unfiltered_cleaned_split_fixed.json

    # The "ramp": explicit stages of increasing rate, 6 x 60s (6 minutes nominal —
    # real per-trial wall-clock time is longer near saturation, see
    # run_test_goodput.sh's own timeout comment). Cut from an original 10 stages
    # (2026-07-16): a full 10-stage/60s run took ~43 minutes end-to-end once real
    # queueing set in near saturation — at up to 1000 experiments, that's not
    # tractable. 6 stages trades some resolution on exactly where the SLA breaks
    # for a per-trial cost that's actually survivable across a full optimize step.
    #
    # NOT load.sweep (the automatic saturation-point-discovery preprocessing phase)
    # — confirmed 2026-07-16 from a real hung job: sweep's preprocessing stage hits
    # a genuine upstream bug in run_stage()'s post-timeout cleanup (waits on
    # active_requests_counter reaching 0 in a loop that never exits, even after
    # vLLM itself reports num_requests_running=0 / num_requests_waiting=0 — i.e.
    # the server has nothing in flight, but the client's own bookkeeping never
    # clears). Bypassing sweep entirely avoids that code path.
    #
    # Rates: 0.2 to 2.5 req/s, linear — REVISED 2026-07-16, down from an original
    # 1-20 req/s guess that turned out to be wildly oversaturated for this specific
    # hardware/model/dataset combination. Real ShareGPT prompts are long (observed
    # mean ~1400-1600 tokens, P90 ~2200-2350) — far heavier than 0-explorative's
    # fixed 512-token synthetic prompts. Observed peak prefill_token_throughput on
    # this A10G is ~4000 tok/s; at rate=20 req/s x ~1500 tok/prompt, sustaining
    # that would need ~30000 tok/s of prefill alone, ~7-8x more than this hardware
    # delivers — meaning every stage in the original range was already deep in
    # saturation, which is also why the ramp showed no rising trend (flat-bad from
    # stage 0, not a gradual climb). 4000/1500 ≈ 2.6 req/s is a rough prefill-only
    # ceiling; picked 2.5 req/s as the top of this range accordingly (decode work
    # competing for the same GPU/KV-cache means the true ceiling is likely lower
    # still — recalibrate again once this range's own baseline data is in).
    load:
      type: constant
      stages:
        - rate: 0.2
          duration: 60
        - rate: 0.66
          duration: 60
        - rate: 1.12
          duration: 60
        - rate: 1.58
          duration: 60
        - rate: 2.04
          duration: 60
        - rate: 2.5
          duration: 60

    api:
      type: chat                # Qwen2.5-7B-Instruct is an instruction/chat model
      streaming: true          # REQUIRED to get TTFT/ITL/TPOT at all — without this,
                                # inference-perf only reports full-response latency.
      # SLO headers give inference-perf's own report a native "goodput_metrics" block
      # (SLO-compliant throughput) alongside the summary — confirmed field names from
      # docs/config.md, 2026-07-15. Thresholds are an interactive-chat industry-standard
      # starting point (per this repo's own decision, since 0-explorative's own observed
      # TTFT/ITL were measured under a saturating GuideLLM benchmark, not comparable to
      # a chatbot SLA) — expect to recalibrate once this study's own baseline/sweep
      # results are in. Akamas' own goal.constraints (in the study YAML) is the actual
      # enforcement mechanism for the optimizer; these headers make inference-perf's own
      # report independently show the same SLO story, so they're kept in sync with it —
      # loosened 2026-07-16 from 1000ms/50ms to match goal.constraints' own 1500ms/300ms.
      headers:
        x-slo-ttft-ms: "1500"
        x-slo-tpot-ms: "300"
      slo_unit: "ms"

    server:
      type: vllm
      model_name: qwen2.5-7b
      base_url: http://vllm.llm-serving.svc.cluster.local:8000

    # REQUIRED, added 2026-07-16 after a real failed run: inference-perf uses
    # server.model_name for two DIFFERENT purposes — routing API requests (where
    # "qwen2.5-7b", vLLM's --served-model-name, is correct) and loading the tokenizer
    # via HuggingFace's AutoTokenizer.from_pretrained (where "qwen2.5-7b" is not a
    # valid HF repo id and fails with "is not a local folder and is not a valid model
    # identifier"). tokenizer.pretrained_model_name_or_path overrides just the
    # tokenizer lookup with the real HF repo id, confirmed against inference-perf's
    # own docs/config.md "Tokenizer" section and its full-config examples.
    tokenizer:
      pretrained_model_name_or_path: Qwen/Qwen2.5-7B-Instruct

    # inference-perf queries the *target's* Prometheus for correlated metrics —
    # this does not replace Akamas' own telemetry (akamas/telemetry/prometheus.yaml
    # scrapes the same Prometheus instance directly for the goal/constraint metrics;
    # this section is for inference-perf's own report only).
    metrics:
      type: prometheus
      prometheus:
        url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        scrape_interval: 15

    report:
      request_lifecycle:
        summary: true
        per_stage: true
        per_request: true

    # Write reports to the mounted PVC (see 05-job.yaml) so they survive the Job's
    # pod lifecycle — default would otherwise write inside the ephemeral container fs.
    storage:
      local_storage:
        path: "/benchmarks/reports-{timestamp}"
