# OPTIONAL — not needed for this study's default model (Qwen2.5-7B-Instruct, ungated).
# Template — do NOT commit with a real token. Create manually if a future variant of
# this study serves a gated model instead:
#
#   kubectl create secret generic hf-token \
#     --from-literal=token=hf_xxxxxxxxxxxxxxxxxxxx \
#     --namespace llm-serving
#
# The account must have accepted that model's license on Hugging Face first, e.g.:
#   https://huggingface.co/meta-llama/Meta-Llama-3.1-8B-Instruct
apiVersion: v1
kind: Secret
metadata:
  name: hf-token
  namespace: llm-serving
type: Opaque
stringData:
  token: "REPLACE_WITH_YOUR_HF_TOKEN"
