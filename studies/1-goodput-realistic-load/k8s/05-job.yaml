apiVersion: batch/v1
kind: Job
metadata:
  name: aiperf-benchmark
  namespace: llm-benchmark
spec:
  # Do not retry on failure — a failed benchmark should be inspected, not silently retried.
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never

      # Run on the CPU node; the GPU node is tainted exclusively for vLLM.
      nodeSelector:
        node-role: system

      initContainers:
        # Poll vLLM's /health endpoint until the model is fully loaded.
        - name: wait-for-vllm
          image: alpine:3
          command:
            - sh
            - -c
            - |
              until wget -qO- http://vllm.llm-serving.svc.cluster.local:8000/health >/dev/null 2>&1; do
                echo "$(date -u +%T) waiting for vLLM readiness..."
                sleep 10
              done
              echo "vLLM is ready."

      containers:
        # NVIDIA AIPerf (ai-dynamo/aiperf) replaces kubernetes-sigs/inference-perf
        # 2026-07-17 — see README's "Load generator" section for the full reasoning
        # (inference-perf's open-loop rate model caused unbounded queue growth near
        # saturation; AIPerf's closed-loop --concurrency model is self-limiting).
        #
        # No official prebuilt container image found (checked ghcr.io/ai-dynamo,
        # the repo's own Dockerfile is unpublished-image source only) — AIPerf ships
        # as a PyPI package (confirmed: pypi.org/project/aiperf, requires-python
        # <3.14,>=3.10), so this installs it into a plain python:3.12-slim base at
        # container start, version-pinned for reproducibility.
        - name: aiperf
          image: python:3.12-slim
          command: ["sh", "-c"]
          args:
            - |
              set -e
              pip install --quiet aiperf==0.11.0
              aiperf profile \
                --model qwen2.5-7b \
                --tokenizer Qwen/Qwen2.5-7B-Instruct \
                --url http://vllm.llm-serving.svc.cluster.local:8000 \
                --endpoint-type chat \
                --streaming \
                --public-dataset sharegpt \
                --concurrency 1,2,4,8,16,32,64 \
                --benchmark-duration 60 \
                --goodput "time_to_first_token:1500 inter_token_latency:300" \
                --ui simple \
                --output-artifact-dir "/benchmarks/aiperf-$(date +%s)"
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true   # only needed for gated models, see 03-hf-secret.yaml
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - name: results
              mountPath: /benchmarks
            - name: hf-cache
              mountPath: /root/.cache/huggingface
              # read-write (not read-only like the old sharegpt-dataset mount) —
              # AIPerf manages its own cache population/invalidation here, unlike
              # inference-perf which needed a separate prep job because of its own
              # dataset-loading bug (see README).

      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: aiperf-results
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-cache
