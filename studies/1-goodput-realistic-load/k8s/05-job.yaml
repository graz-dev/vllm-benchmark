apiVersion: batch/v1
kind: Job
metadata:
  name: aiperf-benchmark
  namespace: llm-benchmark
spec:
  # Do not retry on failure — a failed benchmark should be inspected, not silently retried.
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never

      # Run on the CPU node; the GPU node is tainted exclusively for vLLM.
      nodeSelector:
        node-role: system

      initContainers:
        # Poll vLLM's /health endpoint until the model is fully loaded.
        - name: wait-for-vllm
          image: alpine:3
          command:
            - sh
            - -c
            - |
              until wget -qO- http://vllm.llm-serving.svc.cluster.local:8000/health >/dev/null 2>&1; do
                echo "$(date -u +%T) waiting for vLLM readiness..."
                sleep 10
              done
              echo "vLLM is ready."

      containers:
        # NVIDIA AIPerf (ai-dynamo/aiperf) replaces kubernetes-sigs/inference-perf
        # 2026-07-17 — see README's "Load generator" section for the full reasoning
        # (inference-perf's open-loop rate model caused unbounded queue growth near
        # saturation; AIPerf's closed-loop --concurrency model is self-limiting).
        #
        # No official prebuilt container image found (checked ghcr.io/ai-dynamo,
        # the repo's own Dockerfile is unpublished-image source only) — AIPerf ships
        # as a PyPI package (confirmed: pypi.org/project/aiperf, requires-python
        # <3.14,>=3.10), so this installs it into a plain python:3.12-slim base at
        # container start, version-pinned for reproducibility.
        - name: aiperf
          image: python:3.12-slim
          command: ["sh", "-c"]
          args:
            - |
              set -e
              pip install --quiet aiperf==0.11.0

              # 2026-07-22: back to a single fixed-list phase (Discover + per-trial
              # dynamic bracket, 2026-07-21, reverted same week) — the two-task
              # Discover/RunTest split turned out not workable with Akamas' own
              # windowing model, see README's "Per-trial saturation discovery"
              # section for the full incident and why it was rolled back. RunTest
              # is the only phase again, so it now owns the PVC prune and dataset
              # cache prep that briefly moved to Discover.
              find /benchmarks -mindepth 1 -maxdepth 1 -name 'aiperf-*' -exec rm -rf {} +

              CACHE_FILE=/benchmarks/sharegpt-cache/inputs.json
              if [ ! -f "$CACHE_FILE" ]; then
                echo "No cached ShareGPT inputs.json — generating once (one-time ~5min dataset validation pass)..."
                set +e
                aiperf profile \
                  --model qwen2.5-7b \
                  --tokenizer Qwen/Qwen2.5-7B-Instruct \
                  --url http://vllm.llm-serving.svc.cluster.local:8000 \
                  --endpoint-type chat \
                  --streaming \
                  --public-dataset sharegpt \
                  --concurrency 1 \
                  --request-count 1 \
                  --ui simple \
                  --output-artifact-dir /tmp/sharegpt-prep
                set -e
                if [ ! -f /tmp/sharegpt-prep/inputs.json ]; then
                  echo "ERROR: prep run did not produce inputs.json — see log above" >&2
                  exit 1
                fi
                mkdir -p /benchmarks/sharegpt-cache
                cp /tmp/sharegpt-prep/inputs.json "$CACHE_FILE"
              else
                echo "Reusing cached ShareGPT inputs.json from $CACHE_FILE (skips dataset validation)."
              fi

              # 2026-07-22: 12 levels, log-spaced 150->1024 (ratio ~1.19x/step), 300s
              # each = exactly 60min. Sized from this study's own real baseline data:
              # a Discover-recipe run (since reverted, but its finding still stands)
              # found the baseline config's own SLA-breaking bracket at
              # concurrency 128-256 — starting this list at 150 skips levels this
              # study already explored cleanly at length (16-96, see "Sizing the
              # concurrency sweep" below) and spends all 12 levels at higher
              # resolution across the range where the wall actually sits, up to
              # 1024 (matching vLLM.max_num_seqs's own tuned domain ceiling).
              # Known tradeoff, accepted: a tuned config with a very low
              # max_num_seqs (its own domain allows down to 16) could wall out
              # below 150, in which case every level here would breach SLA with no
              # clean/degraded contrast for that specific trial.
              CONCURRENCY_LIST="150,179,213,253,302,359,428,509,606,722,860,1024"

              aiperf profile \
                --model qwen2.5-7b \
                --tokenizer Qwen/Qwen2.5-7B-Instruct \
                --url http://vllm.llm-serving.svc.cluster.local:8000 \
                --endpoint-type chat \
                --streaming \
                --input-file "$CACHE_FILE" \
                --custom-dataset-type inputs_json \
                --concurrency "$CONCURRENCY_LIST" \
                --benchmark-duration 300 \
                --goodput "time_to_first_token:1500 inter_token_latency:300" \
                --ui simple \
                --output-artifact-dir "/benchmarks/aiperf-$(date +%s)"
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true   # only needed for gated models, see 03-hf-secret.yaml
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              memory: "8Gi"
          volumeMounts:
            - name: results
              mountPath: /benchmarks
            - name: hf-cache
              mountPath: /root/.cache/huggingface
              # read-write (not read-only like the old sharegpt-dataset mount) —
              # AIPerf manages its own cache population/invalidation here, unlike
              # inference-perf which needed a separate prep job because of its own
              # dataset-loading bug (see README).

      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: aiperf-results
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-cache
