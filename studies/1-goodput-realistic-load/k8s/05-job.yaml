apiVersion: batch/v1
kind: Job
metadata:
  name: aiperf-benchmark
  namespace: llm-benchmark
spec:
  # Do not retry on failure — a failed benchmark should be inspected, not silently retried.
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never

      # Run on the CPU node; the GPU node is tainted exclusively for vLLM.
      nodeSelector:
        node-role: system

      initContainers:
        # Poll vLLM's /health endpoint until the model is fully loaded.
        - name: wait-for-vllm
          image: alpine:3
          command:
            - sh
            - -c
            - |
              until wget -qO- http://vllm.llm-serving.svc.cluster.local:8000/health >/dev/null 2>&1; do
                echo "$(date -u +%T) waiting for vLLM readiness..."
                sleep 10
              done
              echo "vLLM is ready."

      containers:
        # NVIDIA AIPerf (ai-dynamo/aiperf) replaces kubernetes-sigs/inference-perf
        # 2026-07-17 — see README's "Load generator" section for the full reasoning
        # (inference-perf's open-loop rate model caused unbounded queue growth near
        # saturation; AIPerf's closed-loop --concurrency model is self-limiting).
        #
        # No official prebuilt container image found (checked ghcr.io/ai-dynamo,
        # the repo's own Dockerfile is unpublished-image source only) — AIPerf ships
        # as a PyPI package (confirmed: pypi.org/project/aiperf, requires-python
        # <3.14,>=3.10), so this installs it into a plain python:3.12-slim base at
        # container start, version-pinned for reproducibility.
        - name: aiperf
          image: python:3.12-slim
          command: ["sh", "-c"]
          args:
            - |
              set -e
              pip install --quiet aiperf==0.11.0

              # 2026-07-17: without this, each of the concurrency levels below
              # re-downloads/re-tokenizes/re-validates the FULL 73k-conversation
              # ShareGPT dataset from scratch (~4-5 min each, confirmed from a real
              # run's own logs) — a fresh AIPerfSystem is started per concurrency
              # level, and the ShareGPT loader always re-validates the whole dataset
              # regardless of how many requests actually get sent. That shows up as
              # a visible stall/drop between every step of the ramp in Grafana.
              #
              # Fix: generate AIPerf's own inputs.json (the fully validated/tokenized
              # conversation set — confirmed via source, aiperf/dataset/dataset_manager.py
              # _generate_input_payloads() dumps the ENTIRE loaded dataset, not just
              # requests actually sent) ONCE, cached on the aiperf-results PVC so it
              # survives across Akamas trials too, then feed it back via
              # --input-file/--custom-dataset-type inputs_json (a real, registered
              # loader — aiperf/plugin/plugins.yaml's custom_dataset_loader.inputs_json
              # entry, aiperf/dataset/loader/inputs_json.py — that replays payloads
              # verbatim with no re-tokenization/re-validation pass). Same
              # model/tokenizer/streaming flags used for both the prep and real run so
              # the cached payloads match what the real sweep would generate itself.
              CACHE_FILE=/benchmarks/sharegpt-cache/inputs.json
              if [ ! -f "$CACHE_FILE" ]; then
                echo "No cached ShareGPT inputs.json — generating once (one-time ~5min dataset validation pass)..."
                # --request-count 1 (not --benchmark-duration): waits for exactly 1
                # request to actually complete, however long that takes. A first
                # attempt used --benchmark-duration 1 and failed the whole job —
                # real request latency at concurrency 1 is several seconds (TTFT +
                # decode), so the 1s window timed out with 0 completed requests,
                # AIPerf exited non-zero ("No profile results to export"), and set -e
                # killed the script before it ever reached the real sweep below.
                # set +e around this call: the expensive part (download + validate +
                # tokenize + write inputs.json) is already done and on disk by the
                # time the short profiling phase runs, so a profiling-phase hiccup
                # here shouldn't throw away work that's already complete — confirmed
                # the hard way (see note above): a prior attempt's `cp` never ran
                # because `aiperf profile` exited non-zero and set -e killed the
                # script right after, forcing a full ~4.5min redo next run. The
                # explicit check for /tmp/sharegpt-prep/inputs.json below is the
                # actual success signal, not this command's exit code.
                set +e
                aiperf profile \
                  --model qwen2.5-7b \
                  --tokenizer Qwen/Qwen2.5-7B-Instruct \
                  --url http://vllm.llm-serving.svc.cluster.local:8000 \
                  --endpoint-type chat \
                  --streaming \
                  --public-dataset sharegpt \
                  --concurrency 1 \
                  --request-count 1 \
                  --ui simple \
                  --output-artifact-dir /tmp/sharegpt-prep
                set -e
                if [ ! -f /tmp/sharegpt-prep/inputs.json ]; then
                  echo "ERROR: prep run did not produce inputs.json — see log above" >&2
                  exit 1
                fi
                mkdir -p /benchmarks/sharegpt-cache
                cp /tmp/sharegpt-prep/inputs.json "$CACHE_FILE"
              else
                echo "Reusing cached ShareGPT inputs.json from $CACHE_FILE (skips per-level dataset validation)."
              fi

              aiperf profile \
                --model qwen2.5-7b \
                --tokenizer Qwen/Qwen2.5-7B-Instruct \
                --url http://vllm.llm-serving.svc.cluster.local:8000 \
                --endpoint-type chat \
                --streaming \
                --input-file "$CACHE_FILE" \
                --custom-dataset-type inputs_json \
                --concurrency 1,2,4,8,16,32 \
                --benchmark-duration 300 \
                --goodput "time_to_first_token:1500 inter_token_latency:300" \
                --ui simple \
                --output-artifact-dir "/benchmarks/aiperf-$(date +%s)"
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true   # only needed for gated models, see 03-hf-secret.yaml
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - name: results
              mountPath: /benchmarks
            - name: hf-cache
              mountPath: /root/.cache/huggingface
              # read-write (not read-only like the old sharegpt-dataset mount) —
              # AIPerf manages its own cache population/invalidation here, unlike
              # inference-perf which needed a separate prep job because of its own
              # dataset-loading bug (see README).

      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: aiperf-results
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-cache
