# One-time data prep: downloads the raw ShareGPT dataset and fixes a known
# upstream inference-perf bug before the load test ever touches it.
#
# kubernetes-sigs/inference-perf's HFShareGPTDataGenerator.get_chat_data() (used
# whenever api.type: chat, our case) indexes each conversation turn as a dict
# without checking its type. Some ShareGPT entries have a turn encoded as a JSON
# string instead of a JSON object (see
# https://github.com/kubernetes-sigs/inference-perf/issues/429) — get_chat_data
# then crashes with "string indices must be integers, not 'str'", which aborts
# inference-perf's whole preprocessing stage (confirmed 2026-07-15 from a real
# job failure). The sibling get_completion_data() already works around this
# (json.loads the string turn back into a dict); get_chat_data() does not.
#
# Rather than patch inference-perf itself, this job downloads the dataset once
# and applies the same normalization to every conversation turn, so the cleaned
# file has no string-encoded turns left for get_chat_data() to trip over.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sharegpt-clean-script
  namespace: llm-benchmark
data:
  clean_sharegpt.py: |
    import json
    import os
    import urllib.request

    SRC_URL = (
        "https://huggingface.co/datasets/anon8231489123/ShareGPT_Vicuna_unfiltered/"
        "resolve/main/ShareGPT_V3_unfiltered_cleaned_split.json"
    )
    RAW_PATH = "/data/sharegpt/raw.json"
    OUT_PATH = "/data/sharegpt/ShareGPT_V3_unfiltered_cleaned_split_fixed.json"

    if os.path.exists(OUT_PATH):
        print(f"{OUT_PATH} already exists, skipping (delete it to force a re-run).")
        raise SystemExit(0)

    print(f"Downloading {SRC_URL} ...")
    urllib.request.urlretrieve(SRC_URL, RAW_PATH)
    print(f"Downloaded {os.path.getsize(RAW_PATH)} bytes, loading + cleaning ...")

    with open(RAW_PATH) as f:
        data = json.load(f)
    print(f"Loaded {len(data)} entries")

    cleaned = []
    skipped = 0
    for entry in data:
        turns = entry.get("conversations")
        if not turns:
            skipped += 1
            continue
        fixed_turns = []
        ok = True
        for turn in turns:
            if isinstance(turn, dict):
                fixed_turns.append(turn)
            elif isinstance(turn, str):
                # The known-bad case: a turn encoded as a JSON string instead of
                # an object — same normalization inference-perf's own
                # get_conversation_turn_content() applies for the completion API.
                try:
                    parsed = json.loads(turn)
                except json.JSONDecodeError:
                    ok = False
                    break
                if not isinstance(parsed, dict):
                    ok = False
                    break
                fixed_turns.append(parsed)
            else:
                ok = False
                break
        if not ok or not fixed_turns:
            skipped += 1
            continue
        entry["conversations"] = fixed_turns
        cleaned.append(entry)

    print(f"Cleaned {len(cleaned)} entries, skipped {skipped} unrecoverable entries")

    # Written as JSON LINES (one object per line), not a single top-level JSON
    # array, despite the .json extension (kept only because inference-perf's own
    # HFShareGPTDataGenerator requires config.path to end in ".json" for a single
    # file — see its __init__). A top-level array forces HF `datasets`' JSON
    # loader to parse the entire file into memory before it can iterate at all,
    # even with streaming=True; with 4 worker processes each doing that
    # simultaneously for a ~650MB file, this OOM-killed the benchmark pod at its
    # 8Gi limit (confirmed 2026-07-16 from a real OOMKilled pod). JSON Lines lets
    # PyArrow's actual streaming reader process the file incrementally instead.
    with open(OUT_PATH, "w") as f:
        for entry in cleaned:
            f.write(json.dumps(entry) + "\n")
    os.remove(RAW_PATH)
    print(f"Wrote {OUT_PATH} ({os.path.getsize(OUT_PATH)} bytes)")

---
apiVersion: batch/v1
kind: Job
metadata:
  name: sharegpt-dataset-prep
  namespace: llm-benchmark
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        node-role: system
      containers:
        - name: prep
          image: python:3.12-slim
          command: ["python3", "/scripts/clean_sharegpt.py"]
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"   # json.load of the ~670MB file needs headroom well
                               # beyond the file's own size for Python's parsed
                               # object graph
          volumeMounts:
            - name: script
              mountPath: /scripts
            - name: dataset
              mountPath: /data/sharegpt
      volumes:
        - name: script
          configMap:
            name: sharegpt-clean-script
        - name: dataset
          persistentVolumeClaim:
            claimName: sharegpt-dataset
