apiVersion: batch/v1
kind: Job
metadata:
  name: aiperf-discover
  namespace: llm-benchmark
spec:
  # Do not retry on failure — a failed benchmark should be inspected, not silently retried.
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never

      # Run on the CPU node; the GPU node is tainted exclusively for vLLM.
      nodeSelector:
        node-role: system

      initContainers:
        # Poll vLLM's /health endpoint until the model is fully loaded.
        - name: wait-for-vllm
          image: alpine:3
          command:
            - sh
            - -c
            - |
              until wget -qO- http://vllm.llm-serving.svc.cluster.local:8000/health >/dev/null 2>&1; do
                echo "$(date -u +%T) waiting for vLLM readiness..."
                sleep 10
              done
              echo "vLLM is ready."

      containers:
        # 2026-07-21: "Discover" phase — runs BEFORE the RunTest sweep (05-job.yaml)
        # in this trial's own workflow, see README's "Per-trial saturation discovery"
        # section. Finds THIS TRIAL'S OWN concurrency bracket (the last concurrency
        # where TTFT/ITL SLA still passes, and the first where it fails) using
        # AIPerf's own max-concurrency-under-sla search recipe, then writes both
        # numbers to a plain JSON file on the shared aiperf-results PVC so the
        # RunTest task (a separate pod, same PVC) can read them and build a sweep
        # densely sampling THAT specific bracket — instead of a fixed concurrency
        # list that's right for one config and wrong for every other (see "Windowing
        # chases raw throughput" incident this study already hit once with a static
        # list).
        - name: aiperf
          image: python:3.12-slim
          command: ["sh", "-c"]
          args:
            - |
              set -e
              pip install --quiet aiperf==0.11.0

              # Wipe every previous trial's output before starting this one — see
              # 05-job.yaml's own history of the same fix (PVC filled up after ~26
              # trials otherwise). Discover runs first each trial, so this is the
              # one place this cleanup needs to happen; RunTest no longer does it.
              find /benchmarks -mindepth 1 -maxdepth 1 -name 'aiperf-*' -exec rm -rf {} +

              CACHE_FILE=/benchmarks/sharegpt-cache/inputs.json
              if [ ! -f "$CACHE_FILE" ]; then
                echo "No cached ShareGPT inputs.json — generating once (one-time ~5min dataset validation pass)..."
                set +e
                aiperf profile \
                  --model qwen2.5-7b \
                  --tokenizer Qwen/Qwen2.5-7B-Instruct \
                  --url http://vllm.llm-serving.svc.cluster.local:8000 \
                  --endpoint-type chat \
                  --streaming \
                  --public-dataset sharegpt \
                  --concurrency 1 \
                  --request-count 1 \
                  --ui simple \
                  --output-artifact-dir /tmp/sharegpt-prep
                set -e
                if [ ! -f /tmp/sharegpt-prep/inputs.json ]; then
                  echo "ERROR: prep run did not produce inputs.json — see log above" >&2
                  exit 1
                fi
                mkdir -p /benchmarks/sharegpt-cache
                cp /tmp/sharegpt-prep/inputs.json "$CACHE_FILE"
              else
                echo "Reusing cached ShareGPT inputs.json from $CACHE_FILE (skips dataset validation)."
              fi

              DISCOVER_DIR="/benchmarks/aiperf-discover-$(date +%s)"
              aiperf profile \
                --model qwen2.5-7b \
                --tokenizer Qwen/Qwen2.5-7B-Instruct \
                --url http://vllm.llm-serving.svc.cluster.local:8000 \
                --endpoint-type chat \
                --streaming \
                --input-file "$CACHE_FILE" \
                --custom-dataset-type inputs_json \
                --search-recipe max-concurrency-under-sla \
                --search-style grid \
                --concurrency-min 8 \
                --concurrency-max 1024 \
                --ttft-sla-ms 1500 \
                --tpot-sla-ms 300 \
                --benchmark-duration 300 \
                --ui simple \
                --output-artifact-dir "$DISCOVER_DIR"

              # 2026-07-21: write BOTH boundary values sla_breach_knee gives us, not
              # just max_passing_concurrency — RunTest's own sweep now targets the
              # exact bracket between them (the real transition zone), not arbitrary
              # fractions of a single point. See README's "Per-trial saturation
              # discovery" section for why this is more precise: with an 8-step grid
              # this coarse (8,16,32,63,126,252,502,1000...), the true SLA edge could
              # sit anywhere between a passing step and the next failing one — RunTest
              # is what actually samples densely inside that specific gap.
              BREACH_FILE="$DISCOVER_DIR/sweep_aggregate/sla_breach.json"
              python3 -c "
              import json
              d = json.load(open('$BREACH_FILE'))
              max_passing = d.get('max_passing_concurrency')
              first_failing = d.get('first_failing_concurrency')
              # Fallback if every grid step already breaches SLA (a genuinely bad
              # config) — 16 matches this study's own confirmed-clean lowest rung
              # from the earlier fixed-list exploration, not an arbitrary guess.
              if max_passing is None:
                  max_passing = 16
              result = {'max_passing': max_passing, 'first_failing': first_failing}
              print('Discovered bracket:', result)
              json.dump(result, open('/benchmarks/discovered-concurrency.json', 'w'))
              "
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - name: results
              mountPath: /benchmarks
            - name: hf-cache
              mountPath: /root/.cache/huggingface

      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: aiperf-results
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-cache
