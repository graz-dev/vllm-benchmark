name: vLLM
description: vLLM
parameters: 
  - name: gpu_memory_utilization
    domain:
      type: real
      domain: [0.0, 1.0]
    defaultValue: 0.9
  - name: max_num_seqs
    domain:
      type: integer
      domain: [1, 1000000000000]
    defaultValue: 128
  - name: max_num_batched_tokens
    domain:
      type: integer
      domain: [1, 1000000000000]
    defaultValue: 1024
  - name: max_model_len
    domain:
      type: integer
      domain: [1, 1000000000000]
    defaultValue: 8192
  - name: tensor_parallel_size
    domain:
      type: integer
      domain: [1, 1000000000000]
    defaultValue: 1
  

metrics:
# step 1: isolate the symptom: TTFT vs. ITL
  - name: e2e_request_latency_p95
  - name: e2e_request_latency_avg
  - name: request_success_rate
  - name: time_to_first_token_p95
  - name: time_to_first_token_avg
  - name: prefill_token_throughput
  - name: inter_token_latency_p95
  - name: inter_token_latency_avg
  - name: decode_token_throughput
# step 2: detect server saturation
  - name: num_requests_running
  - name: num_requests_waiting
# step 3: evaluate VRAM and KV cache health
  - name: kv_cache_usage_avg
  - name: kv_cache_usage_max
  - name: preemption_rate
  - name: prefix_cache_hit_rate
# step 4: analyze request sequence lengths
  - name: input_sequence_length_p95
  - name: input_sequence_length_avg
  - name: output_sequence_length_p95
  - name: output_sequence_length_avg
# step 5: review distributed inference strategy
  - name: fleet_e2e_latency_percentile
  - name: fleet_inter_token_latency_percentile
  - name: fleet_request_success_rate
  - name: fleet_kv_cache_usage_avg
  - name: inter_token_latency_p95_5m
  - name: inter_token_latency_p95_max_per_pod
  - name: inter_token_latency_p95_min_per_pod