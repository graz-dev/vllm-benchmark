# LoadBalancer type provisions an AWS NLB and assigns a public IP / DNS name.
# Get the external IP with:  kubectl get svc open-webui -n monitoring
#
# For an internal-only setup, change type to ClusterIP and use:
#   kubectl port-forward svc/open-webui 8080:8080 -n monitoring
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: monitoring
  annotations:
    # Use NLB instead of the legacy Classic Load Balancer.
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  selector:
    app: open-webui
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: LoadBalancer
