apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      # CPU node — no GPU needed for the UI layer.
      nodeSelector:
        node-role: system

      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - name: http
              containerPort: 8080
          env:
            # Point Open WebUI at the vLLM OpenAI-compatible endpoint.
            - name: OPENAI_API_BASE_URL
              value: "http://vllm.llm-serving.svc.cluster.local:8000/v1"
            # vLLM does not validate API keys by default; any non-empty value works.
            - name: OPENAI_API_KEY
              value: "vllm"
            # Disable the signup/login screen for internal benchmark use.
            # Set to "true" and create an admin account for shared environments.
            - name: WEBUI_AUTH
              value: "false"
            # Persist chat history and settings on the mounted volume.
            - name: DATA_DIR
              value: "/app/backend/data"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /app/backend/data

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-webui-data
