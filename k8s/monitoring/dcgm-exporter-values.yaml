# Helm values for NVIDIA DCGM Exporter.
# Exposes GPU hardware metrics (utilisation, VRAM, power, temperature) to Prometheus.
#
# Install:
#   helm repo add gpu-helm-charts https://nvidia.github.io/dcgm-exporter/helm-charts
#   helm repo update
#   helm upgrade --install dcgm-exporter gpu-helm-charts/dcgm-exporter \
#     --namespace monitoring \
#     -f k8s/monitoring/dcgm-exporter-values.yaml

# Run only on the GPU node (node-role: llm-serving).
nodeSelector:
  node-role: llm-serving

# Required to schedule on the tainted GPU node.
tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

# Let Prometheus (via kube-prometheus-stack) scrape DCGM metrics every 15 s.
# serviceMonitorSelectorNilUsesHelmValues: false in prometheus values ensures
# this ServiceMonitor is picked up without needing extra labels.
serviceMonitor:
  enabled: true
  interval: 15s
  namespace: monitoring

# Key metrics collected (exposed as DCGM_FI_DEV_* by the exporter):
#   DCGM_FI_DEV_GPU_UTIL       — GPU compute utilisation %
#   DCGM_FI_DEV_MEM_COPY_UTIL  — Memory bandwidth utilisation %
#   DCGM_FI_DEV_FB_USED        — VRAM used (MiB)
#   DCGM_FI_DEV_FB_FREE        — VRAM free (MiB)
#   DCGM_FI_DEV_POWER_USAGE    — Power draw (W)
#   DCGM_FI_DEV_GPU_TEMP       — GPU temperature (°C)
