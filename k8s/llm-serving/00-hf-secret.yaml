# Template — do NOT commit with a real token.
# Create this secret manually before deploying vLLM:
#
#   kubectl create secret generic hf-token \
#     --from-literal=token=hf_xxxxxxxxxxxxxxxxxxxx \
#     --namespace llm-serving
#
# The account must have accepted the Llama 3.1 license on HuggingFace:
#   https://huggingface.co/meta-llama/Meta-Llama-3.1-8B-Instruct
apiVersion: v1
kind: Secret
metadata:
  name: hf-token
  namespace: llm-serving
type: Opaque
stringData:
  token: "REPLACE_WITH_YOUR_HF_TOKEN"
