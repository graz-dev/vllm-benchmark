apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: vllm-bench
  region: us-east-2
  version: "1.35"
  tags:
    Project: vllm-bench
    Provisioner: eksctl

# This file is used ONLY if you want to manage the GPU node group independently
# of the cluster lifecycle — e.g., delete it after a benchmark run to stop GPU
# billing (~$1.21/h) and re-add it before the next run.
#
# Since llm-serving is already declared in cluster.yaml, this file is redundant
# during initial provisioning. Use it only for:
#
#   Add GPU node back:
#     eksctl create nodegroup -f infra/eks/nodegroups.yaml
#
#   Remove GPU node (keep cluster alive):
#     eksctl delete nodegroup --cluster vllm-bench --region us-east-2 --name llm-serving
#
managedNodeGroups:

  - name: llm-serving
    instanceType: g5.2xlarge
    desiredCapacity: 1
    minSize: 0
    maxSize: 1
    volumeSize: 100
    amiFamily: AmazonLinux2
    labels:
      node-role: llm-serving
    taints:
      - key: nvidia.com/gpu
        value: "present"
        effect: NoSchedule
